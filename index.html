<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>偏旁識字小挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .animate-bounce-slow { animation: bounce 3s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body class="bg-amber-50 min-h-screen">

    <div id="app">
        <!-- 載入中畫面 -->
        <div id="loading-screen" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
            <div id="loading-icon">
                <i class="fas fa-circle-notch fa-spin text-5xl text-blue-500 mb-4"></i>
            </div>
            <p id="loading-text" class="text-xl text-blue-600 font-bold">正在連線至 Firebase...</p>
            <div id="error-details" class="mt-4 text-sm text-red-500 max-w-md hidden bg-red-50 p-4 rounded-lg border border-red-200"></div>
        </div>

        <!-- 角色選擇畫面 -->
        <div id="role-selection" class="hidden min-h-screen flex items-center justify-center p-4">
            <div class="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full text-center border-4 border-amber-200">
                <h1 class="text-3xl font-bold text-amber-600 mb-8 tracking-wider">🌟 偏旁識字小挑戰 🌟</h1>
                <div class="space-y-4">
                    <button onclick="showLogin('student')" class="w-full py-4 bg-blue-400 hover:bg-blue-500 text-white rounded-2xl text-2xl font-bold transition-transform hover:scale-105 flex items-center justify-center gap-3 shadow-md">
                        <i class="fas fa-user"></i> 我是學生
                    </button>
                    <button onclick="showLogin('teacher')" class="w-full py-4 bg-emerald-400 hover:bg-emerald-500 text-white rounded-2xl text-2xl font-bold transition-transform hover:scale-105 flex items-center justify-center gap-3 shadow-md">
                        <i class="fas fa-graduation-cap"></i> 我是老師
                    </button>
                </div>
            </div>
        </div>

        <!-- 學生登入 -->
        <div id="student-login" class="hidden min-h-screen flex items-center justify-center p-4">
            <div class="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full border-4 border-blue-200 text-center">
                <i class="fas fa-user-circle text-6xl text-blue-400 mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-700 mb-6">請輸入學號</h2>
                <input type="text" id="student-id-input" class="w-full p-4 text-center text-2xl border-2 border-blue-200 rounded-xl mb-6 focus:outline-none focus:border-blue-400" placeholder="例如: 1A01">
                <button onclick="doStudentLogin()" class="w-full py-3 bg-blue-500 text-white rounded-xl text-xl font-bold hover:bg-blue-600">進入遊戲</button>
                <button onclick="goBack()" class="mt-4 text-gray-400 block w-full text-center">返回</button>
            </div>
        </div>

        <!-- 老師登入 -->
        <div id="teacher-login" class="hidden min-h-screen flex items-center justify-center p-4">
            <div class="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full border-4 border-emerald-200 text-center">
                <i class="fas fa-chalkboard-teacher text-6xl text-emerald-400 mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-700 mb-6">老師管理登入</h2>
                <input type="password" id="teacher-pwd-input" class="w-full p-4 text-center text-xl border-2 border-emerald-200 rounded-xl mb-6 focus:outline-none focus:border-emerald-400" placeholder="請輸入密碼">
                <button onclick="doTeacherLogin()" class="w-full py-3 bg-emerald-500 text-white rounded-xl text-xl font-bold hover:bg-emerald-600">登入</button>
                <button onclick="goBack()" class="mt-4 text-gray-400 block w-full text-center">返回</button>
            </div>
        </div>

        <!-- 遊戲主體容器 -->
        <div id="game-container" class="hidden"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 題目定義
        const QUESTIONS = [
            { q: "以下哪個字的部件不是「圭」？", options: ["鮭", "採", "佳", "娃"], correct: "採" },
            { q: "以下哪個字的偏旁不是「忄」？", options: ["快", "怕", "住", "忙"], correct: "住" },
            { q: "以下哪個字的部件不是「分」？", options: ["粉", "芬", "打", "份"], correct: "打" },
            { q: "以下哪個字的偏旁不是「𥫗」？", options: ["笑", "芬", "笛", "符"], correct: "芬" },
            { q: "以下哪個字的部件不是「巴」？", options: ["花", "吧", "把", "爸"], correct: "花" },
            { q: "以下哪個字的部件不是「衣」？", options: ["京", "裳", "袋", "裝"], correct: "京" },
            { q: "以下哪個字的偏旁跟其他的不一樣？", options: ["猴", "狐", "狗", "海"], correct: "海" },
            { q: "以下哪個字的偏旁跟其他的不一樣？", options: ["彩", "妹", "菜", "採"], correct: "妹" }
        ];

        // 您的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyBRX_gukKcP3LY8H6892y-zph8bb-4iKq0",
            authDomain: "quiz-4f068.firebaseapp.com",
            projectId: "quiz-4f068",
            storageBucket: "quiz-4f068.firebasestorage.app",
            messagingSenderId: "495030127539",
            appId: "1:495030127539:web:49deb8e6da2e5f4de919c6",
            measurementId: "G-295E53NEZR"
        };

        let app, auth, db;
        let currentUser = null;
        let myRole = null; 
        let myStudentId = null;
        let gameState = { status: 'waiting', currentQuestion: 0, startTime: 0 };
        let students = [];
        let answers = [];
        let timerInterval = null;

        // 初始化錯誤顯示
        function showError(title, details) {
            document.getElementById('loading-icon').innerHTML = '<i class="fas fa-exclamation-triangle text-5xl text-red-500 mb-4"></i>';
            document.getElementById('loading-text').className = "text-xl text-red-600 font-bold";
            document.getElementById('loading-text').innerText = title;
            const errDiv = document.getElementById('error-details');
            errDiv.innerText = details;
            errDiv.classList.remove('hidden');
        }

        // 初始化 Firebase
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            showError("Firebase 初始化失敗", e.message);
        }

        window.onload = async () => {
            try {
                // 1. 執行匿名登入
                const userCredential = await signInAnonymously(auth);
                console.log("登入成功:", userCredential.user.uid);

                // 2. 監聽認證狀態
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        // 3. 開始同步數據
                        startSyncing();
                        // 4. 顯示進入畫面
                        showUI('role-selection');
                    }
                });
            } catch (err) {
                console.error("Auth Error:", err);
                showError("無法連線至認證伺服器", "請確認 Firebase Console 中已啟用『匿名登入 (Anonymous)』功能。錯誤代碼: " + err.code);
            }
        };

        function startSyncing() {
            // 使用簡化路徑，避免複雜的階層結構
            const gameDocRef = doc(db, 'gameState', 'main');
            const studentsColRef = collection(db, 'students');
            const answersColRef = collection(db, 'answers');

            // 監聽遊戲狀態
            onSnapshot(gameDocRef, (snap) => {
                if (snap.exists()) {
                    gameState = snap.data();
                    render();
                } else {
                    // 如果沒有初始數據，則創建一個
                    setDoc(gameDocRef, { status: 'waiting', currentQuestion: 0, startTime: 0 });
                }
            }, (err) => {
                console.error("Firestore Error:", err);
                showError("資料庫存取失敗", "請確認 Firestore 規則已發佈且為開放狀態。錯誤: " + err.message);
            });

            // 監聽學生列表
            onSnapshot(studentsColRef, (snap) => {
                students = snap.docs.map(d => d.data());
                render();
            });

            // 監聽答案列表
            onSnapshot(answersColRef, (snap) => {
                answers = snap.docs.map(d => d.data());
                render();
            });

            // 定時器
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameState.status === 'active') render();
            }, 1000);
        }

        // UI 切換
        function showUI(id) {
            document.querySelectorAll('#app > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // 全域函數
        window.showLogin = (role) => showUI(role + '-login');
        window.goBack = () => showUI('role-selection');

        window.doStudentLogin = async () => {
            const id = document.getElementById('student-id-input').value.trim();
            if (!id) return;
            myStudentId = id;
            myRole = 'student';
            try {
                await setDoc(doc(db, 'students', id), {
                    id: id, score: 0, joinedAt: Date.now()
                });
                showUI('game-container');
                render();
            } catch (e) { alert("登入資料寫入失敗: " + e.message); }
        };

        window.doTeacherLogin = () => {
            const pwd = document.getElementById('teacher-pwd-input').value;
            if (pwd === '115712') {
                myRole = 'teacher';
                showUI('game-container');
                render();
            } else {
                alert('密碼錯誤');
            }
        };

        window.submitAnswer = async (opt) => {
            const timeRem = getTimeRemaining();
            if (gameState.status !== 'active' || timeRem <= 0) return;
            const hasAns = answers.some(a => a.studentId === myStudentId && a.questionIndex === gameState.currentQuestion);
            if (hasAns) return;

            const correct = QUESTIONS[gameState.currentQuestion].correct;
            const isCorrect = opt === correct;

            try {
                await setDoc(doc(db, 'answers', `${myStudentId}_${gameState.currentQuestion}`), {
                    studentId: myStudentId,
                    questionIndex: gameState.currentQuestion,
                    answer: opt,
                    isCorrect: isCorrect,
                    submittedAt: Date.now()
                });

                if (isCorrect) {
                    const s = students.find(x => x.id === myStudentId);
                    await updateDoc(doc(db, 'students', myStudentId), {
                        score: (s?.score || 0) + 100
                    });
                }
            } catch (e) { console.error(e); }
        };

        window.teacherNext = async () => {
            let nextIdx = (gameState.status === 'revealed') ? gameState.currentQuestion + 1 : gameState.currentQuestion;
            let nextStatus = (nextIdx >= QUESTIONS.length) ? 'ended' : 'active';
            if (nextIdx >= QUESTIONS.length) nextIdx = QUESTIONS.length - 1;

            await setDoc(doc(db, 'gameState', 'main'), {
                status: nextStatus,
                currentQuestion: nextIdx,
                startTime: Date.now()
            });
        };

        window.teacherReveal = async () => {
            await updateDoc(doc(db, 'gameState', 'main'), { status: 'revealed' });
        };

        window.resetGame = async () => {
            if (!confirm("確定要重設所有資料嗎？")) return;
            try {
                await setDoc(doc(db, 'gameState', 'main'), { status: 'waiting', currentQuestion: 0, startTime: 0 });
                const ansSnap = await getDocs(collection(db, 'answers'));
                for (let d of ansSnap.docs) await deleteDoc(d.ref);
                const stdSnap = await getDocs(collection(db, 'students'));
                for (let d of stdSnap.docs) await updateDoc(d.ref, { score: 0 });
            } catch (e) { alert(e.message); }
        };

        function getTimeRemaining() {
            if (gameState.status !== 'active') return 0;
            return Math.max(0, 30 - Math.floor((Date.now() - gameState.startTime) / 1000));
        }

        // 渲染函數
        function render() {
            const container = document.getElementById('game-container');
            if (myRole === 'student') renderStudent(container);
            else if (myRole === 'teacher') renderTeacher(container);
        }

        function renderStudent(el) {
            const score = students.find(s => s.id === myStudentId)?.score || 0;
            const currentQ = QUESTIONS[gameState.currentQuestion];
            const myAns = answers.find(a => a.studentId === myStudentId && a.questionIndex === gameState.currentQuestion);
            const timeRem = getTimeRemaining();

            let content = `
                <div class="min-h-screen bg-amber-50 flex flex-col">
                    <div class="bg-white p-4 shadow flex justify-between items-center px-6">
                        <div class="font-bold text-gray-600">學號: <span class="text-blue-600">${myStudentId}</span></div>
                        <div class="font-bold text-amber-600 bg-amber-100 px-4 py-1 rounded-full text-sm">⭐ ${score} 分</div>
                    </div>
                    <div class="flex-1 flex flex-col items-center justify-center p-4 max-w-2xl mx-auto w-full">
            `;

            if (gameState.status === 'waiting') {
                content += `<div class="text-center animate-bounce-slow"><div class="text-7xl mb-6">🎈</div><h2 class="text-3xl font-bold text-amber-600">已進入大廳！</h2><p class="text-xl text-gray-500 mt-2">請等待老師發題...</p></div>`;
            } else if (gameState.status === 'active') {
                content += `
                    <div class="w-full bg-white p-6 rounded-3xl shadow-xl border-4 border-amber-200 relative overflow-hidden">
                        <div class="absolute top-0 left-0 h-2 bg-blue-500 transition-all duration-1000" style="width: ${(timeRem/30)*100}%"></div>
                        <div class="flex justify-between mb-6 pt-2">
                            <span class="text-gray-500 font-bold">第 ${gameState.currentQuestion+1} 題</span>
                            <span class="text-amber-500 font-bold"><i class="fas fa-clock"></i> ${timeRem}s</span>
                        </div>
                        <h2 class="text-2xl font-bold text-center mb-10">${currentQ.q}</h2>
                        <div class="grid grid-cols-2 gap-4">
                            ${currentQ.options.map(opt => `
                                <button onclick="submitAnswer('${opt}')" class="py-6 text-3xl font-bold rounded-2xl border-4 border-blue-100 bg-blue-50 hover:bg-blue-100 ${myAns ? 'opacity-50 cursor-not-allowed' : ''}">${opt}</button>
                            `).join('')}
                        </div>
                        ${myAns ? '<p class="mt-6 text-center text-blue-500 font-bold italic">答案已送出，等待開獎...</p>' : ''}
                    </div>
                `;
            } else if (gameState.status === 'revealed') {
                const isCorrect = myAns?.isCorrect;
                content += `
                    <div class="w-full bg-white p-8 rounded-3xl shadow-xl border-4 text-center">
                        <h2 class="text-gray-400 font-bold mb-4">正確答案</h2>
                        <div class="text-7xl font-bold mb-8 text-green-600">${currentQ.correct}</div>
                        ${myAns ? (isCorrect ? `<div class="text-green-600 text-2xl font-bold">🎉 答對了！</div>` : `<div class="text-red-500 text-2xl font-bold">❌ 答錯囉！</div>`) : `<div class="text-gray-400">未作答</div>`}
                    </div>
                `;
            } else if (gameState.status === 'ended') {
                content += `<div class="text-center bg-white p-12 rounded-3xl shadow-xl"><div class="text-6xl mb-6">🏆</div><h2 class="text-4xl font-bold text-amber-600">挑戰結束！</h2><div class="text-8xl font-black text-blue-500 my-4">${score}</div></div>`;
            }

            content += `</div></div>`;
            el.innerHTML = content;
        }

        function renderTeacher(el) {
            const currentQ = QUESTIONS[gameState.currentQuestion];
            const currentAnswers = answers.filter(a => a.questionIndex === gameState.currentQuestion);
            const timeRem = getTimeRemaining();
            
            let content = `
                <div class="min-h-screen bg-gray-50 flex flex-col">
                    <header class="bg-white shadow px-6 py-4 flex justify-between items-center">
                        <div class="flex items-center gap-3 text-emerald-600"><i class="fas fa-graduation-cap text-3xl"></i><h1 class="text-2xl font-bold">老師控制台</h1></div>
                        <div class="flex items-center gap-4">
                            <span class="bg-gray-100 px-3 py-1 rounded font-bold">學生: ${students.length}</span>
                            <button onclick="resetGame()" class="text-red-500 text-sm"><i class="fas fa-sync"></i> 重設</button>
                        </div>
                    </header>
                    <main class="flex-1 p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2 space-y-6">
            `;

            if (gameState.status === 'waiting') {
                content += `<div class="bg-white p-12 rounded-2xl shadow text-center"><button onclick="teacherNext()" class="bg-emerald-500 text-white text-2xl font-bold py-5 px-16 rounded-2xl shadow-lg">開始發題</button></div>`;
            } else if (gameState.status === 'active') {
                content += `
                    <div class="bg-white p-8 rounded-2xl shadow border-2 border-emerald-400">
                        <div class="flex justify-between mb-8"><span class="font-bold">第 ${gameState.currentQuestion+1} 題</span><span class="text-3xl font-bold text-gray-600">${timeRem}s</span></div>
                        <h3 class="text-2xl font-bold mb-10">${currentQ.q}</h3>
                        <div class="text-xl mb-4 text-emerald-600 font-bold">已作答: ${currentAnswers.length} / ${students.length}</div>
                        <button onclick="teacherReveal()" class="bg-amber-500 text-white font-bold py-3 px-8 rounded-xl shadow">公佈答案</button>
                    </div>
                `;
            } else if (gameState.status === 'revealed') {
                content += `
                    <div class="bg-white p-8 rounded-2xl shadow border-4 border-green-500">
                        <h3 class="text-2xl font-bold mb-6 text-green-600">本題正解：${currentQ.correct}</h3>
                        <button onclick="teacherNext()" class="w-full bg-emerald-500 text-white text-xl font-bold py-4 rounded-xl shadow-lg">${gameState.currentQuestion === QUESTIONS.length - 1 ? '結束挑戰' : '下一題'}</button>
                    </div>
                `;
            } else if (gameState.status === 'ended') {
                content += `<div class="bg-white p-10 rounded-2xl shadow text-center"><h2 class="text-3xl font-bold mb-6">排行榜</h2>${students.sort((a,b)=>b.score-a.score).slice(0,5).map(s=>`<div class="flex justify-between p-2 border-b"><span>${s.id}</span><span class="font-bold text-blue-600">${s.score}分</span></div>`).join('')}</div>`;
            }

            content += `</div><div class="bg-white p-6 rounded-2xl shadow overflow-y-auto max-h-[70vh]">
                <h3 class="font-bold mb-4 border-b pb-2">學生連線列表</h3>
                ${students.length === 0 ? '<p class="text-gray-400">尚無學生加入</p>' : ''}
                ${students.sort((a,b)=>b.score-a.score).map(s=>`<div class="flex justify-between py-1 text-sm"><span>${s.id}</span><span class="font-mono">${s.score}</span></div>`).join('')}
            </div></main></div>`;
            el.innerHTML = content;
        }
    </script>
</body>
</html>
